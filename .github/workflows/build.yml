name: build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ESP-IDF build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: "v5.5.2"
          target: esp32c3
          path: "."
          command: >-
            idf.py build &&
            idf.py merge-bin -o esp32-nfc-tool-full.bin &&
            cp build/esp32-nfc-tool.bin build/esp32-nfc-tool-ota.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/esp32-nfc-tool-full.bin
            build/esp32-nfc-tool-ota.bin
          if-no-files-found: error
          retention-days: 14
