<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ESP32 NFC Tool</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="dot"></span>
    <span>esp32-nfc-tool</span>
  </div>
  <div class="meta" id="meta">PN532: --</div>
</header>

<main id="view"></main>

<nav class="tabbar">
  <button class="tab" data-tab="scan" aria-label="扫描">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8l2.8-2.8M17 7l2.8-2.8"/></svg>

    <span>卡库</span>
  </button>
  <button class="tab" data-tab="keys" aria-label="密钥">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="M10.85 12.15L19 4M18 5l2 2M15 8l2 2"/></svg>
    <span>密钥</span>
  </button>
  <button class="tab" data-tab="settings" aria-label="设置">

    <span>设置</span>
  </button>
</nav>

<div id="toast" class="toast hidden"></div>

<script src="/app.js"></script>
</body>
</html>
