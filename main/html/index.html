<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NFC Tool</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header id="header">
  <div class="hdr-left">
    <span class="hdr-title">NFC TOOL</span>
  </div>
  <div class="hdr-right">
    <span class="hdr-state" id="hdrState">连接中</span>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<main id="app"></main>

<nav id="nav">
  <button class="nav-item active" data-tab="scan">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12C2 6.5 6.5 2 12 2s10 4.5 10 10-4.5 10-10 10S2 17.5 2 12z"/><path d="M12 9a3 3 0 100 6 3 3 0 000-6z"/><path d="M2 12h4M18 12h4M12 2v4M12 18v4"/></svg>
    <span>扫描</span>
  </button>
  <button class="nav-item" data-tab="library">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="16" height="16" rx="2"/><path d="M6 6V4a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2h-2"/></svg>
    <span>卡库</span>
  </button>
  <button class="nav-item" data-tab="keys">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="15" r="4"/><path d="M10.85 12.15L19 4M18 5l2 2M15 8l2 2"/></svg>
    <span>密钥</span>
  </button>
  <button class="nav-item" data-tab="settings">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <span>设置</span>
  </button>
</nav>

<div id="toast" class="toast"></div>

<!-- 确认对话框 -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <p id="modalMsg"></p>
    <div class="modal-actions">
      <button class="mbtn" id="modalCancel">取消</button>
      <button class="mbtn mbtn-primary" id="modalOk">确认</button>
    </div>
  </div>
</div>

<!-- 输入对话框 -->
<div id="promptModal" class="modal-overlay hidden">
  <div class="modal-box">
    <p id="promptMsg"></p>
    <input class="modal-input" id="promptInput" type="text">
    <div class="modal-actions">
      <button class="mbtn" id="promptCancel">取消</button>
      <button class="mbtn mbtn-primary" id="promptOk">确认</button>
    </div>
  </div>
</div>

<!-- 导入 Dump 对话框 -->
<div id="importModal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 class="modal-title">导入 Dump 文件</h3>
    <div class="modal-meta" id="importFileInfo"></div>
    <div class="modal-label">名字</div>
    <input class="modal-input" id="importName" type="text">
    <div class="modal-label">类型</div>
    <div class="type-radio">
      <label class="type-opt">
        <input type="radio" name="importType" value="mfc">
        <span>Mifare Classic</span>
      </label>
      <label class="type-opt">
        <input type="radio" name="importType" value="ntag">
        <span>NTAG / Ultralight</span>
      </label>
    </div>
    <div class="modal-actions">
      <button class="mbtn" id="importCancelBtn">取消</button>
      <button class="mbtn mbtn-primary" id="importOkBtn">导入</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
